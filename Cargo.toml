[package]
name = "sysvibe"
version = "0.4.0"
edition = "2024"
description = "A visually striking, zero-flicker system monitor TUI for Linux"
authors = ["SysVibe Team"]
license = "MIT"
repository = "https://github.com/harunkrl/SysVibe"
keywords = ["system-monitor", "tui", "linux", "terminal"]
categories = ["command-line-utilities"]

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
sysinfo = "0.34"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
dirs = "6"
chrono = "0.4"
